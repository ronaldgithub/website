(function () {
  var lang;
  try { lang = localStorage.getItem("dbaronald-lang"); } catch (e) {}

    if (location.hostname.indexOf("dbaronald.nl") !== -1) {
      lang = "nl";
    } else {
      var nav = (navigator.languages || [navigator.language || "en"]).join(",").toLowerCase();
      lang = nav.indexOf("nl") !== -1 ? "nl" : "en";
    }
  }
  location.replace("/" + lang + "/");
})();
</script>
